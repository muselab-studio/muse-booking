<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Muse Lab Studio 繆思寫真預約</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--p:#C49ACC;--pl:#EDD9F5;--pd:#8B5E99;--a:#F5C842;--al:#FFF3B0;--ad:#C9960A;--bg:#FDF6FF;--tx:#2D1A35;--muted:#7A5E88;--bd:#DFC8E8;--ok:#6BBF8E;--err:#E87878;--r:14px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:60px;}
header{background:#fff;border-bottom:1.5px solid var(--bd);padding:20px 0 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(196,154,204,0.1);}
header h1{font-family:'Noto Serif TC',serif;font-size:19px;font-weight:600;color:var(--pd);}
header p{font-size:12px;color:var(--muted);margin-top:3px;letter-spacing:0.06em;}
.wrap{max-width:760px;margin:0 auto;padding:32px 18px 0;}
.sr{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
.sb{width:27px;height:27px;border-radius:50%;background:var(--p);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.st{font-size:15px;font-weight:700;}
.card{background:#fff;border-radius:var(--r);border:1.5px solid var(--bd);padding:24px 26px;margin-bottom:20px;box-shadow:0 2px 14px rgba(180,140,200,0.11);}
.cn{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cn button{background:var(--pl);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;color:var(--pd);display:flex;align-items:center;justify-content:center;transition:.15s;}
.cn button:hover{background:var(--p);color:#fff;}
.cm{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:600;color:var(--pd);}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cdn{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding-bottom:5px;}
.cc{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1.5px solid transparent;transition:.15s;position:relative;}
.cc:hover:not(.dis):not(.emp){background:var(--pl);border-color:var(--p);}
.cc.sel{background:var(--p);color:#fff;border-color:var(--pd);font-weight:700;}
.cc.tod{border-color:var(--ad);}
.cc.tod:not(.sel)::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--ad);}
.cc.dis{color:#ccc;cursor:not-allowed;}.cc.emp{cursor:default;}
.nb{background:var(--al);border:1.5px solid var(--a);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--ad);font-weight:500;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.nb::before{content:'⚠️';font-size:14px;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sbt{border:2px solid var(--bd);border-radius:var(--rs);padding:13px 11px;background:#fff;cursor:pointer;transition:.18s;text-align:left;position:relative;}
.sbt:hover:not(.bk):not(.sel){border-color:var(--p);background:var(--pl);}
.sbt.sel{border-color:var(--pd);background:var(--p);color:#fff;}
.sbt.bk{border-color:#e0d0e8;background:#f9f4fb;cursor:not-allowed;opacity:0.6;}
.st2{font-size:14px;font-weight:700;}.sl{font-size:12px;margin-top:2px;opacity:.75;}.ss{font-size:11px;font-weight:700;letter-spacing:.05em;margin-top:4px;}
.sbt.bk .ss{color:var(--err);}.sbt.sel .ss{color:rgba(255,255,255,.85);}
.ck{position:absolute;top:9px;right:10px;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:10px;}
.sbt.sel .ck{background:rgba(255,255,255,.9);color:var(--pd);font-weight:900;}
.dtt{font-size:13px;color:var(--muted);margin-bottom:12px;font-weight:500;}
.ndm{text-align:center;color:var(--muted);padding:28px 0;font-size:14px;}
.ndm span{display:block;font-size:28px;margin-bottom:7px;}
.sum{background:var(--pl);border-radius:var(--rs);padding:11px 14px;margin-top:12px;font-size:13px;color:var(--pd);display:none;}
.sum.show{display:block;}
.stag{display:inline-block;background:var(--p);color:#fff;border-radius:20px;padding:3px 11px;font-size:12px;font-weight:700;margin:2px 3px 2px 0;}
.ob{display:flex;gap:14px;}
.obt{flex:1;padding:18px 8px;border:2px solid var(--bd);border-radius:var(--rs);background:#fff;cursor:pointer;transition:.18s;text-align:center;font-family:'Noto Sans TC',sans-serif;}
.obt:hover{border-color:var(--p);background:var(--pl);}
.obt.sel{border-color:var(--pd);background:var(--p);color:#fff;}
.on{font-size:28px;font-weight:700;display:block;font-family:'Noto Serif TC',serif;}
.ot{font-size:13px;margin-top:4px;opacity:.72;display:block;}
.obt.sel .ot{opacity:.88;}
.fg{margin-bottom:16px;}
label{display:block;font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin-bottom:6px;}
input[type=text],input[type=tel]{width:100%;padding:12px 15px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:15px;font-family:'Noto Sans TC',sans-serif;color:var(--tx);background:#fdfaff;outline:none;transition:.15s;}
input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(196,154,204,.2);}
.btn{width:100%;padding:16px;background:var(--p);color:#fff;border:none;border-radius:var(--rs);font-size:16px;font-weight:700;font-family:'Noto Sans TC',sans-serif;letter-spacing:.08em;cursor:pointer;transition:.18s;box-shadow:0 4px 18px rgba(196,154,204,.4);}
.btn:hover{background:var(--pd);transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--tx);color:#fff;padding:13px 26px;border-radius:40px;font-size:14px;font-weight:500;z-index:9999;transition:transform .3s,opacity .3s;opacity:0;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.18);max-width:90vw;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#toast.err{background:var(--err);}#toast.ok{background:var(--ok);}
#ld{display:none;position:fixed;inset:0;background:rgba(253,246,255,.88);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#ld.show{display:flex;}
.sp{width:42px;height:42px;border:4px solid var(--pl);border-top-color:var(--pd);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#ld p{font-size:14px;color:var(--muted);}
#succ{display:none;text-align:center;padding:60px 20px;}
#succ.show{display:block;}
.si{font-size:58px;margin-bottom:18px;}
#succ h2{font-family:'Noto Serif TC',serif;font-size:22px;color:var(--pd);margin-bottom:10px;}
#succ p{font-size:14px;color:var(--muted);line-height:1.8;}
.rbtn{margin-top:26px;display:inline-block;padding:11px 30px;background:var(--a);color:var(--tx);border-radius:40px;font-weight:700;font-size:14px;cursor:pointer;border:none;font-family:'Noto Sans TC',sans-serif;transition:.15s;}
.rbtn:hover{background:var(--ad);color:#fff;}
@media(max-width:480px){.card{padding:18px 14px;}.sg{grid-template-columns:1fr;}header h1{font-size:16px;}.on{font-size:24px;}}
</style>
</head>
<body>
<header>
  <h1>✦ Muse Lab Studio 繆思寫真預約</h1>
  <p>請詳閱時段說明後再進行預約</p>
</header>
<div id="ld"><div class="sp"></div><p>處理中，請稍候⋯</p></div>
<div id="toast"></div>
<div class="wrap">
  <div id="succ">
    <div class="si">🎉</div>
    <h2>預約成功！</h2>
    <p>感謝您的預約，<br>我們將盡快與您確認時段細節。<br>如有問題請聯繫 Muse Lab Studio。</p>
    <button class="rbtn" onclick="resetAll()">重新預約</button>
  </div>
  <div id="mf">
    <div class="sr"><div class="sb">1</div><div class="st">選擇拍攝日期</div></div>
    <div class="card">
      <div class="cn">
        <button onclick="prevM()">&#8249;</button>
        <div class="cm" id="cm"></div>
        <button onclick="nextM()">&#8250;</button>
      </div>
      <div class="cg" id="cg"></div>
    </div>
    <div class="sr"><div class="sb">2</div><div class="st">選擇拍攝時段</div></div>
    <div class="card">
      <div class="nb">請確認後再預約，勿隨意更改，每次最多可選 4 個時段</div>
      <div id="sa"><div class="ndm"><span>📅</span>請先選擇上方日期</div></div>
      <div class="sum" id="sum"><strong>已選時段：</strong><span id="stags"></span></div>
    </div>
    <div class="sr"><div class="sb">3</div><div class="st">選擇拍攝套數</div></div>
    <div class="card">
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px;">請選擇這次拍攝想要的風格套數（最多 2 套）</p>
      <div class="ob">
        <button class="obt" onclick="selOut(1)"><span class="on">1</span><span class="ot">套</span></button>
        <button class="obt" onclick="selOut(2)"><span class="on">2</span><span class="ot">套</span></button>
      </div>
    </div>
    <div class="sr"><div class="sb">4</div><div class="st">填寫聯絡資料</div></div>
    <div class="card">
      <div class="fg"><label for="nm">姓名</label><input type="text" id="nm" placeholder="請輸入您的姓名"></div>
      <div class="fg" style="margin-bottom:0"><label for="ph">聯絡電話</label><input type="tel" id="ph" placeholder="請輸入手機號碼"></div>
    </div>
    <button class="btn" onclick="doSubmit()">確認預約</button>
    <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:12px;line-height:1.8;">送出後系統將自動記錄預約資料<br>如需修改請提前聯繫我們</p>
  </div>
</div>

<script>
// ── 設定：貼上你的 Apps Script 網址 ──────────────────────────────
var GAS = 'https://script.google.com/macros/s/AKfycbyP6S7N8iODA8dZZiTAkYA5nKtrw5Ukt7eGMOv0_RO22yV5BES1i85Qmv9EzUSfRP22/exec';

var SLOTS = [
  {id:'A', time:'10:00–12:30', label:'上午時段'},
  {id:'B', time:'13:00–15:30', label:'下午時段 1'},
  {id:'C', time:'16:00–18:30', label:'下午時段 2'},
  {id:'D', time:'19:00–20:30', label:'晚間時段'}
];
var MAX = 4;
var cy, cm2, selDate=null, selSlots=[], selOut2=null, booked={};

// ── JSONP helper（解決跨域）────────────────────────────────────────
function jsonp(url, cb) {
  var cbName = 'cb_' + Date.now();
  window[cbName] = function(data) {
    delete window[cbName];
    document.getElementById('jsonp-script') && document.getElementById('jsonp-script').remove();
    cb(null, data);
  };
  var s = document.createElement('script');
  s.id = 'jsonp-script';
  s.src = url + (url.indexOf('?') > -1 ? '&' : '?') + 'callback=' + cbName;
  s.onerror = function() { cb(new Error('JSONP failed')); };
  document.body.appendChild(s);
}

// ── Init ──────────────────────────────────────────────────────────
window.onload = function() {
  var n = new Date(); cy = n.getFullYear(); cm2 = n.getMonth();
  renderCal();
  fetchBooked();
};

function fetchBooked() {
  jsonp(GAS + '?action=getBooked', function(err, data) {
    if (!err && data && data.booked) {
      booked = data.booked;
      if (selDate) renderSlots(selDate);
    }
  });
}

// ── Calendar ──────────────────────────────────────────────────────
function renderCal() {
  var mn = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('cm').textContent = cy + ' 年 ' + mn[cm2];
  var g = document.getElementById('cg');
  g.innerHTML = '';
  ['日','一','二','三','四','五','六'].forEach(function(d) {
    var e = document.createElement('div'); e.className = 'cdn'; e.textContent = d; g.appendChild(e);
  });
  var fd = new Date(cy, cm2, 1).getDay();
  var dm = new Date(cy, cm2+1, 0).getDate();
  var td = new Date(); td.setHours(0,0,0,0);
  for (var i = 0; i < fd; i++) { var e = document.createElement('div'); e.className = 'cc emp'; g.appendChild(e); }
  for (var d = 1; d <= dm; d++) {
    var dt = new Date(cy, cm2, d);
    var ds = fmt(dt);
    var e = document.createElement('div'); e.className = 'cc'; e.textContent = d;
    if (dt < td) { e.classList.add('dis'); }
    else {
      if (dt.toDateString() === td.toDateString()) e.classList.add('tod');
      if (selDate === ds) e.classList.add('sel');
      (function(s){ e.onclick = function(){ pickDate(s); }; })(ds);
    }
    g.appendChild(e);
  }
}
function prevM(){ cm2--; if(cm2<0){cm2=11;cy--;} renderCal(); }
function nextM(){ cm2++; if(cm2>11){cm2=0;cy++;} renderCal(); }
function pickDate(ds){ selDate=ds; selSlots=[]; renderCal(); renderSlots(ds); updSum(); }
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtD(ds){ var p=ds.split('-'); return p[0]+' 年 '+parseInt(p[1])+' 月 '+parseInt(p[2])+' 日'; }

// ── Slots ─────────────────────────────────────────────────────────
function renderSlots(ds) {
  var bk = booked[ds] || [];
  var area = document.getElementById('sa');
  area.innerHTML = '<div class="dtt">📅 ' + fmtD(ds) + ' 可預約時段</div>';
  var g = document.createElement('div'); g.className = 'sg';
  SLOTS.forEach(function(sl) {
    var isBk = bk.indexOf(sl.id) > -1;
    var isSel = selSlots.indexOf(sl.id) > -1;
    var b = document.createElement('div');
    b.className = 'sbt' + (isBk?' bk':'') + (isSel?' sel':'');
    b.innerHTML = '<div class="st2">'+sl.time+'</div><div class="sl">'+sl.label+'</div>'
      +'<div class="ss">'+(isBk?'✗ 已預約':isSel?'✓ 已選取':'可預約')+'</div>'
      +'<div class="ck">'+(isSel?'✓':'')+'</div>';
    if (!isBk) { (function(id){ b.onclick = function(){ togSlot(id); }; })(sl.id); }
    g.appendChild(b);
  });
  area.appendChild(g);
}
function togSlot(id) {
  if (!selDate) return;
  var i = selSlots.indexOf(id);
  if (i > -1) { selSlots.splice(i,1); }
  else {
    if (selSlots.length >= MAX) { toast('最多只能選 '+MAX+' 個時段','err'); return; }
    selSlots.push(id);
  }
  renderSlots(selDate); updSum();
}
function updSum() {
  var el = document.getElementById('sum');
  if (!selSlots.length) { el.classList.remove('show'); return; }
  el.classList.add('show');
  document.getElementById('stags').innerHTML = selSlots.map(function(id){
    return SLOTS.find(function(s){ return s.id===id; });
  }).filter(Boolean).map(function(s){ return '<span class="stag">'+s.time+'</span>'; }).join('');
}
function selOut(n) {
  selOut2 = n;
  document.querySelectorAll('.obt').forEach(function(b,i){ b.classList.toggle('sel', i+1===n); });
}

// ── Submit（用 JSONP 送出）───────────────────────────────────────
function doSubmit() {
  var name = document.getElementById('nm').value.trim();
  var ph   = document.getElementById('ph').value.trim();
  if (!selDate)       { toast('請選擇預約日期','err'); return; }
  if (!selSlots.length){ toast('請選擇至少一個時段','err'); return; }
  if (!selOut2)       { toast('請選擇拍攝套數','err'); return; }
  if (!name)          { toast('請填寫姓名','err'); return; }
  if (!ph)            { toast('請填寫聯絡電話','err'); return; }

  var lb = selSlots.map(function(id){
    var s = SLOTS.find(function(s){ return s.id===id; }); return s ? s.time : '';
  }).filter(Boolean).join('、');

  ld(1);
  var params = [
    'action=book',
    'name='       + encodeURIComponent(name),
    'phone='      + encodeURIComponent(ph),
    'date='       + encodeURIComponent(selDate),
    'slots='      + encodeURIComponent(selSlots.join(',')),
    'slotLabels=' + encodeURIComponent(lb),
    'outfits='    + encodeURIComponent(selOut2)
  ].join('&');

  jsonp(GAS + '?' + params, function(err, data) {
    ld(0);
    if (err || !data) { toast('發生錯誤，請稍後再試','err'); return; }
    if (data.success) {
      document.getElementById('mf').style.display = 'none';
      document.getElementById('succ').classList.add('show');
      if (!booked[selDate]) booked[selDate] = [];
      selSlots.forEach(function(id){ if(booked[selDate].indexOf(id)<0) booked[selDate].push(id); });
    } else {
      toast(data.message || '預約失敗，請稍後再試','err');
    }
  });
}

// ── Reset ─────────────────────────────────────────────────────────
function resetAll() {
  selDate=null; selSlots=[]; selOut2=null;
  document.getElementById('nm').value='';
  document.getElementById('ph').value='';
  document.getElementById('succ').classList.remove('show');
  document.getElementById('mf').style.display='';
  document.getElementById('sa').innerHTML='<div class="ndm"><span>📅</span>請先選擇上方日期</div>';
  document.getElementById('sum').classList.remove('show');
  document.querySelectorAll('.obt').forEach(function(b){ b.classList.remove('sel'); });
  var n=new Date(); cy=n.getFullYear(); cm2=n.getMonth();
  renderCal(); fetchBooked();
}

// ── Helpers ───────────────────────────────────────────────────────
var tt;
function toast(m,t){ var e=document.getElementById('toast'); e.textContent=m; e.className='show '+(t||''); clearTimeout(tt); tt=setTimeout(function(){ e.className=''; },3200); }
function ld(s){ document.getElementById('ld').className=s?'show':''; }
</script>
</body>
</html>
